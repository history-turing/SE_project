name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Test backend modules
        working-directory: backend
        run: mvn -B -ntp -e -s settings.xml test

      - name: Print surefire reports on failure
        if: failure()
        working-directory: backend
        run: |
          find . -path "*/target/surefire-reports/*" -type f \( -name "*.txt" -o -name "*.xml" \) -print -exec cat {} \;

      - name: Upload backend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: backend/**/target/surefire-reports/**
          if-no-files-found: ignore

      - name: Validate compose contract
        run: docker compose --env-file .env.example -f docker-compose.yml config >/tmp/compose.out

  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    needs:
      - frontend-ci
      - backend-ci
    concurrency:
      group: deploy-main
      cancel-in-progress: false
    steps:
      - name: Configure SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          printf '%s\n' "${{ secrets.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Deploy on server
        run: |
          set -euo pipefail
          ssh -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" <<'EOF'
          set -euo pipefail
          cd /root/SE_project
          git pull --ff-only origin main
          export TREEHOLE_DEPLOY_ENV_FILE=.env.production
          export TREEHOLE_COMPOSE_PROJECT=se_project
          bash scripts/deploy.sh
          docker compose --env-file .env.production -p se_project ps
          curl -sI http://127.0.0.1/ | head -n 1
          EOF
