name: CI/CD

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Test backend modules
        working-directory: backend
        run: mvn -q -s settings.xml -pl whu-treehole-server -am test

  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    needs:
      - frontend-ci
      - backend-ci
    concurrency:
      group: deploy-main
      cancel-in-progress: false
    steps:
      - name: Configure SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          printf '%s\n' "${{ secrets.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Deploy on server
        run: |
          set -euo pipefail
          ssh -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" <<'EOF'
          set -e
          cd /root/SE_project
          git pull --ff-only origin main
          compose_cmd() {
            if docker compose version >/dev/null 2>&1; then
              docker compose "$@"
            else
              docker-compose "$@"
            fi
          }

          compose_cmd up -d --build

          compose_cmd exec -T mysql mysql -uroot -p"${MYSQL_ROOT_PASSWORD:-jwdyszm0220}" -D "${MYSQL_DATABASE:-se_project}" \
            < backend/whu-treehole-server/src/main/resources/db/schema.sql
          compose_cmd exec -T mysql mysql -uroot -p"${MYSQL_ROOT_PASSWORD:-jwdyszm0220}" -D "${MYSQL_DATABASE:-se_project}" \
            < backend/whu-treehole-server/src/main/resources/db/data.sql

          for attempt in $(seq 1 24); do
            if curl -fsS http://127.0.0.1/actuator/health | grep -q '"status":"UP"'; then
              exit 0
            fi
            sleep 5
          done

          compose_cmd ps
          compose_cmd logs backend --tail=200
          exit 1
          EOF
