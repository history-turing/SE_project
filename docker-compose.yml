services:
  mysql:
    image: mysql:8.0.41
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      TZ: Asia/Shanghai
      MYSQL_DATABASE: ${MYSQL_DATABASE:-se_project}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/se_project.sql:/docker-entrypoint-initdb.d/01-se_project.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    environment:
      TZ: Asia/Shanghai
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:?RABBITMQ_USERNAME is required}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
    ports:
      - "127.0.0.1:${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  nacos:
    image: nacos/nacos-server:v2.4.3
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
    ports:
      - "127.0.0.1:${NACOS_PORT:-8848}:8848"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8848/nacos/actuator/health | grep '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_MODULE: whu-treehole-server
        APP_PORT: 8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/actuator/health | grep '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 40s
    environment:
      TZ: Asia/Shanghai
      TREEHOLE_DB_HOST: mysql
      TREEHOLE_DB_PORT: 3306
      TREEHOLE_DB_NAME: ${MYSQL_DATABASE:-se_project}
      TREEHOLE_DB_USERNAME: root
      TREEHOLE_DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      TREEHOLE_REDIS_HOST: redis
      TREEHOLE_REDIS_PORT: 6379
      TREEHOLE_REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      TREEHOLE_NACOS_SERVER_ADDR: ${TREEHOLE_NACOS_SERVER_ADDR:-nacos:8848}
      TREEHOLE_SERVER_PORT: ${TREEHOLE_SERVER_PORT:-8080}
      TREEHOLE_SQL_INIT_MODE: ${TREEHOLE_SQL_INIT_MODE:-never}
      TREEHOLE_AUTH_MOCK_EMAIL_ENABLED: ${TREEHOLE_AUTH_MOCK_EMAIL_ENABLED:-false}
      TREEHOLE_MAIL_HOST: ${TREEHOLE_MAIL_HOST:-smtp.qq.com}
      TREEHOLE_MAIL_PORT: ${TREEHOLE_MAIL_PORT:-587}
      TREEHOLE_MAIL_USERNAME: ${TREEHOLE_MAIL_USERNAME:-}
      TREEHOLE_MAIL_PASSWORD: ${TREEHOLE_MAIL_PASSWORD:-}
      TREEHOLE_MAIL_SMTP_AUTH: ${TREEHOLE_MAIL_SMTP_AUTH:-true}
      TREEHOLE_MAIL_SMTP_STARTTLS: ${TREEHOLE_MAIL_SMTP_STARTTLS:-true}
      TREEHOLE_MAIL_SMTP_STARTTLS_REQUIRED: ${TREEHOLE_MAIL_SMTP_STARTTLS_REQUIRED:-false}
      TREEHOLE_MAIL_SMTP_SSL_ENABLE: ${TREEHOLE_MAIL_SMTP_SSL_ENABLE:-false}
      TREEHOLE_MAIL_SMTP_SSL_TRUST: ${TREEHOLE_MAIL_SMTP_SSL_TRUST:-}
      TREEHOLE_AUTH_MAIL_FROM: ${TREEHOLE_AUTH_MAIL_FROM:-}
      TREEHOLE_AUTH_EMAIL_SUFFIX: ${TREEHOLE_AUTH_EMAIL_SUFFIX:-@whu.edu.cn}
      TREEHOLE_AUTH_EMAIL_CODE_TTL: ${TREEHOLE_AUTH_EMAIL_CODE_TTL:-5m}
      TREEHOLE_AUTH_EMAIL_SEND_COOLDOWN: ${TREEHOLE_AUTH_EMAIL_SEND_COOLDOWN:-60s}
      TREEHOLE_AUTH_SESSION_TTL: ${TREEHOLE_AUTH_SESSION_TTL:-7d}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
    expose:
      - "8080"

  message-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_MODULE: whu-treehole-message-service
        APP_PORT: 8081
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/actuator/health | grep '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 40s
    environment:
      TZ: Asia/Shanghai
      TREEHOLE_DB_HOST: mysql
      TREEHOLE_DB_PORT: 3306
      TREEHOLE_DB_NAME: ${MYSQL_DATABASE:-se_project}
      TREEHOLE_DB_USERNAME: root
      TREEHOLE_DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      TREEHOLE_REDIS_HOST: redis
      TREEHOLE_REDIS_PORT: 6379
      TREEHOLE_REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      TREEHOLE_RABBITMQ_HOST: ${TREEHOLE_RABBITMQ_HOST:-rabbitmq}
      TREEHOLE_RABBITMQ_PORT: ${TREEHOLE_RABBITMQ_PORT:-5672}
      TREEHOLE_RABBITMQ_USERNAME: ${TREEHOLE_RABBITMQ_USERNAME:-treehole}
      TREEHOLE_RABBITMQ_PASSWORD: ${TREEHOLE_RABBITMQ_PASSWORD:?TREEHOLE_RABBITMQ_PASSWORD is required}
      TREEHOLE_NACOS_SERVER_ADDR: ${TREEHOLE_NACOS_SERVER_ADDR:-nacos:8848}
      TREEHOLE_MESSAGE_PORT: ${TREEHOLE_MESSAGE_PORT:-8081}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      nacos:
        condition: service_healthy
    expose:
      - "8081"

  gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_MODULE: whu-treehole-gateway
        APP_PORT: 8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/actuator/health | grep '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 40s
    environment:
      TZ: Asia/Shanghai
      TREEHOLE_NACOS_SERVER_ADDR: ${TREEHOLE_NACOS_SERVER_ADDR:-nacos:8848}
      TREEHOLE_GATEWAY_PORT: ${TREEHOLE_GATEWAY_PORT:-8080}
    depends_on:
      nacos:
        condition: service_healthy
      backend:
        condition: service_healthy
      message-service:
        condition: service_healthy
    expose:
      - "8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 10s
    depends_on:
      gateway:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  mysql-data:
  redis-data:
