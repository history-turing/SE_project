spring:
  application:
    name: whu-treehole-message-service
  cloud:
    nacos:
      discovery:
        server-addr: ${TREEHOLE_NACOS_SERVER_ADDR:localhost:8848}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${TREEHOLE_DB_HOST:localhost}:${TREEHOLE_DB_PORT:3306}/${TREEHOLE_DB_NAME:se_project}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${TREEHOLE_DB_USERNAME:root}
    password: ${TREEHOLE_DB_PASSWORD:}
  data:
    redis:
      host: ${TREEHOLE_REDIS_HOST:localhost}
      port: ${TREEHOLE_REDIS_PORT:6379}
      password: ${TREEHOLE_REDIS_PASSWORD:}
      timeout: 2000ms
  rabbitmq:
    host: ${TREEHOLE_RABBITMQ_HOST:localhost}
    port: ${TREEHOLE_RABBITMQ_PORT:5672}
    username: ${TREEHOLE_RABBITMQ_USERNAME:guest}
    password: ${TREEHOLE_RABBITMQ_PASSWORD:guest}

mybatis:
  mapper-locations: classpath*:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

server:
  port: ${TREEHOLE_MESSAGE_PORT:8081}

treehole:
  messaging:
    recall-window-seconds: ${TREEHOLE_DM_RECALL_WINDOW_SECONDS:120}
